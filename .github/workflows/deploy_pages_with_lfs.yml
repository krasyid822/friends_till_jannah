name: Deploy Pages (with LFS objects)

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    name: Publish site with LFS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Ensure git-lfs and pull objects
        run: |
          git lfs install --local
          git lfs pull --all || true

      - name: Prepare publish directory
        run: |
          mkdir -p public
          # copy the static site folder to publish_dir
          cp -r rihlah_batu_belah_2/* public/ || true

      - name: Debug info before deploy
        run: |
          echo "--- git version ---"
          git --version || true
          echo "--- current dir listing (public) ---"
          ls -la public || true
          echo "--- git remote -v (checkout) ---"
          git remote -v || true
          echo "--- show sample file head ---"
          if [ -f public/index.html ]; then head -n 5 public/index.html; fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          allow_empty_commit: true
